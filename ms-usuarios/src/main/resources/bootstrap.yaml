spring:
  application:
    name: ms-usuarios
  cloud:
    config:
      enabled: true
      uri: http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/ta_ms_usuarios
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/travelagency

eureka:
  instance:
    prefer-ip-address: true
