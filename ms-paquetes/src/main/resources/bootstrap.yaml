spring:
  application:
    name: ms-paquetes
  cloud:
    config:
      enabled: true
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://ms-paquetes-postgres:5432/ta_ms_paquetes
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      default-zone: http://eureka-service:8761/eureka
  instance:
    prefer-ip-address: true




