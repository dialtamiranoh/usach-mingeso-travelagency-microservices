apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ms-paquetes-pvc
  namespace: travelagency
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-paquetes-postgres
  namespace: travelagency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-paquetes-postgres
  template:
    metadata:
      labels:
        app: ms-paquetes-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: "ta_ms_paquetes"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: ms-paquetes-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ms-paquetes-postgres
  namespace: travelagency
spec:
  selector:
    app: ms-paquetes-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
