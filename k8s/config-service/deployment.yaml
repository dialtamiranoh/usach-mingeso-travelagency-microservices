# TODO: Deployment para config-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: dialtamiranoh/travel-agency-config-service:latest
          ports:
            - containerPort: 8080
